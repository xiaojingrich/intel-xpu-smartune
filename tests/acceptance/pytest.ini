[pytest]
testpaths = .
markers =
    service: requires live SmartTune service
    root: requires root/sudo privileges
    gpu: requires Intel GPU hardware
    npu: requires Intel NPU hardware
    network: requires network TC capabilities
    cgroup: requires cgroup v2
    stress: long-running stress/stability tests (skipped by default)

addopts = -v --tb=short -m "not stress"
