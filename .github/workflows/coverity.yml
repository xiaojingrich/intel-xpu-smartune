name: "Coverity (Python & C- Local)"
run-name: "Coverity (Python & C- Local)"

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - '.github/workflows/**'

env:
  COV_HOME: "/home/jianfeng/cov-analysis-linux64-2025.3.0"

jobs:
  coverity-scan:
    runs-on: [self-hosted, linux]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure Coverity
        run: |
          $COV_HOME/bin/cov-configure --template --compiler python --comptype python
          $COV_HOME/bin/cov-configure --template --compiler clang --comptype clangcc

      - name: Coverity Capture & Analyze (Python)
        run: |
          $COV_HOME/bin/coverity capture --dir ./cov-int-python

          $COV_HOME/bin/coverity analyze --project-dir . --dir ./cov-int-python

      - name: Coverity Capture & Analyze (C)
        run: |
          $COV_HOME/bin/cov-build --dir ./cov-int-c ./coverity_build/build_ebpf.sh

          $COV_HOME/bin/coverity analyze --project-dir . --dir ./cov-int-c

      - name: Format Errors to Text
        run: |
          $COV_HOME/bin/cov-format-errors \
            --dir ./cov-int-python \
            --emacs-style \
            > full_project_scan_results_python.txt

          echo "Total issues found:"
          grep -c ": warning:" full_project_scan_results_python.txt || echo "0"

          $COV_HOME/bin/cov-format-errors \
            --dir ./cov-int-c \
            --emacs-style \
            > full_project_scan_results_c.txt
          echo "Total issues found:"
          grep -c ": warning:" full_project_scan_results_c.txt || echo "0"

      - name: Generate Coverity Job Summary
        if: always()
        run: |
          PY_ISSUES=$(grep -c ": warning:" full_project_scan_results_python.txt || echo "0")
          C_ISSUES=$(grep -c ": warning:" full_project_scan_results_c.txt || echo "0")
          TOTAL=$((PY_ISSUES + C_ISSUES))

          echo "### Coverity report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Issues Found | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: | :---: |" >> $GITHUB_STEP_SUMMARY

          PY_STATUS=$([ "$PY_ISSUES" -eq "0" ] && echo "✅ Clean" || echo "⚠️ Action Required")
          echo "| Python (Capture) | $PY_ISSUES | $PY_STATUS |" >> $GITHUB_STEP_SUMMARY

          C_STATUS=$([ "$C_ISSUES" -eq "0" ] && echo "✅ Clean" || echo "⚠️ Action Required")
          echo "| C (cov-build) | $C_ISSUES | $C_STATUS |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total issues found:** $TOTAL" >> $GITHUB_STEP_SUMMARY

          if [ "$TOTAL" -gt "0" ]; then
            echo "<details><summary>Click to view details (Top 10)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            head -n 10 full_project_scan_results_python.txt >> $GITHUB_STEP_SUMMARY
            head -n 10 full_project_scan_results_c.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: coverity-text-report
          path: |
            full_project_scan_results_python.txt
            full_project_scan_results_c.txt
          retention-days: 7