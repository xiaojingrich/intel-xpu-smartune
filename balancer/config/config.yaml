cgroup_mount: "/sys/fs/cgroup"
vendor: "generic"  # admin, generic
thresholds:
  low: 0.4
  medium: 0.6
  high: 0.8
  critical: 1.0
weights:
  cpu: 2
  memory: 7
  io: 1
dominant_app_reduce_factor: 3.5  # When a limited app is dominant and system is not busy, divide both weights and resource_adjust_factor by this value
cpu_busy_threshold: 90
memory_busy_threshold: 90
disk_utilization_threshold: 95
disk_iowait_threshold: 10
disk_io_throughput_threshold_kb: 102400  # KB/s, i.e. 100 MB/s
controlled_apps:
  # Each entry supports five fields, which can be generated by wizard or manually added by users. The balancer uses these fields to
  # identify and monitor apps, and to provide user-friendly display names in notifications and logs:
  #   name        – display name;
  #   id          – unique identifier; used as DB primary key and for systemd
  #                 scope/service matching when applying resource limits
  #   commandline – command line of the main process; used by pgrep when
  #                 adjusting OOM scores; optional but recommended
  #   bpf_name    – list of executable names (comm/basename) that BPF should
  #                 watch for execve events to detect app launch/exit
  #   process_names – list of process names that belong to this app; if empty
  #                   the balancer uses the standard cgroup-based auto-discovery;
  #                   if non-empty these processes are looked up explicitly and
  #                   their resources are aggregated across all cgroups they may
  #                   reside in (useful for multi-process / multi-cgroup apps)
  # F.ex:
  # - name: "heliconSearch"
  #   id: "heliconsearch.id"
  #   commandline: "/usr/local/heliconsearch/HeliconSearch_agent"
  #   bpf_name: ["HeliconSearch_a", "VLMService"]
  #   process_names: ["HeliconSearch_agent", "VLMService"]
weights_top:
  cpu: 2
  memory: 7
  gpu: 5  #added to the default score as a secondary factor after GPU data is collected
passive_resource_control:
  enabled: false  # When disabled, the balancer no longer auto-monitors/throttles top apps on high system pressure; network control and manual throttling are unaffected
# Process noise filtered out from both top-resource sampling and the "Add App" wizard.
# Substring match against lower-cased comm / exe basename. Add app/process names
# here to hide them from monitoring & the wizard.
blacklist: [
  kworker, ksoftirqd, migration, rcu_, watchdog, systemd, dbus-, gdbus,
  gvfs, gvfsd, polkit, snapd, udisks, accounts-daemon, rtkit-, colord,
  packagekit, ibus-, fcitx, at-spi-, pipewire, pulseaudio, wireplumber,
  networkmanager, modemmanager, wpa_supplicant, avahi, cron, rsyslog, logind,
]
cooldown_time: 15 # Cooldown period (seconds) to avoid frequent notifications
regular_update_sys_pressure_time: 5
monitor_idle_check_interval: 10  # Pressure check interval (seconds) when the balancer is idle
app_priority:
  critical: 100
  high: 80
  medium: 50
  low: 20
limit_policy: # Default resource limit ratios for apps at different priority levels
  policy: "combined"  # combined: cpu/mem/disk IO limited under the same condition; separated: cpu/mem and disk IO evaluated independently
  cpu:
    enabled: true
    rate: # No limit for critical apps, so no ratio is configured for them
      high: 0.7  # 70% of total
      medium: 0.5
      low: 0.4
      undefined: 0.3
  memory:
    enabled: true
    rate:
      high: 0.3  # MemoryHigh soft limit
      medium: 0.2
      low: 0.1
      undefined: 0.1
  disk_io:  #
    enabled: true  # Whether to enable disk IO limits; passive limits are not applied uniformly by default — use the API to configure per-app active limits
    rate:
      high:
        write: 50 # Default write limit: 50 MB/s
        read: 60 # Default read limit: 60 MB/s
        write_iops: 2200 # Default write IOPS: 2200 ops/s
        read_iops: 20000 # Default read IOPS: 20000 ops/s
      medium:
        write: 40
        read: 50
        write_iops: 1600
        read_iops: 15000
      low:
        write: 20
        read: 30
        write_iops: 1200
        read_iops: 11000
      undefined:
        write: 10
        read: 20
        write_iops: 1000
        read_iops: 8000
enable_network_control: true # Whether to enable network traffic control
network_thresholds:
  low: 0.3
  medium: 0.5
  high: 0.7
  critical: 0.9
network_interface: "enp2s0" # Change this to your actual network interface name
network_bandwidth_kbit: 1000000   # unit: kbit/s
config_network_bw:  # kbit/s, bandwidth range per priority level
  system:
    min: 50000
    max: 100000
  critical:
    min: 500000
    max: 900000
  high:
    min: 300000
    max: 800000
  low:
    min: 100000
    max: 800000
network_burst_map:
  critical: "64k"
  high: "32k"
  low: "16k"
  system: "8k"
network_system_ports:
  - 22
  - 53
  - 80
  - 443
  - 123
testing_network_app:
  - app_name: "iperf"
    app_cgroup: "session-1879.scope"
    priority: "critical"
